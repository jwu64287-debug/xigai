const state = { idx: Number(localStorage.getItem('xigai-current')||0), mode: localStorage.getItem('xigai-mode')||'blank', chapter:'全部', q:'' };
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function normalize(s){return String(s).toLowerCase().replace(/\s/g,'')}
function displayTitle(x){return (x.important?'⭐ ':'')+x.title}
function filtered(){const q=normalize(state.q);return DATA.filter(x=>(state.chapter==='全部'||x.chapter===state.chapter)&&(!q||normalize(displayTitle(x)+x.answer+x.keywords.join('')).includes(q)))}
function highlight(text,kws){let out=esc(text);[...kws].sort((a,b)=>b.length-a.length).forEach(k=>{if(!k)return; const e=esc(k).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); out=out.replace(new RegExp(e,'g'),'<strong>'+esc(k)+'</strong>')}); return out;}
function renderChapters(){const chapters=['全部',...Array.from(new Set(DATA.map(x=>x.chapter)))]; $('chapters').innerHTML=chapters.map(c=>`<button class="chip ${state.chapter===c?'active':''}" data-chapter="${esc(c)}">${esc(c)}</button>`).join(''); document.querySelectorAll('[data-chapter]').forEach(b=>b.onclick=()=>{state.chapter=b.dataset.chapter;state.idx=0;render()});}
function renderList(arr){$('list').innerHTML=arr.map((x,i)=>`<button class="${i===state.idx?'active':''}" data-jump="${i}">${i+1}. ${esc(displayTitle(x))}<small>${esc(x.chapter)} · ${esc(x.source)}</small></button>`).join(''); document.querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{state.idx=Number(b.dataset.jump);renderCard(filtered())});}
function renderCard(arr){if(!arr.length){$('chapterTag').textContent='无结果';$('sourceTag').textContent='';$('qno').textContent='';$('question').textContent='没有匹配的题目';$('answer').innerHTML='<div class="empty">换一个关键词或章节试试。</div>';$('bar').style.width='0%';return;} if(state.idx<0)state.idx=0;if(state.idx>=arr.length)state.idx=arr.length-1; const x=arr[state.idx]; localStorage.setItem('xigai-current',state.idx); localStorage.setItem('xigai-mode',state.mode); $('chapterTag').textContent=x.chapter;$('sourceTag').textContent=x.source;$('qno').textContent=`第 ${state.idx+1} / ${arr.length} 题`;$('question').textContent=displayTitle(x); let html=''; if(state.mode==='blank'){html='<div class="empty">纯享模式：答案已隐藏。先在脑中回忆，再切换到速背或完整模式核对。</div>'} else if(state.mode==='fast'){html='<div class="kw">'+x.keywords.map(k=>`<span>${esc(k)}</span>`).join('')+'</div>'} else {html='<div class="full">'+x.answer.split('\n').filter(Boolean).map(p=>`<p>${highlight(p,x.keywords)}</p>`).join('')+'</div>'} $('answer').innerHTML=html;$('bar').style.width=((state.idx+1)/arr.length*100).toFixed(1)+'%'; renderList(arr);}
function render(){document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));renderChapters();const arr=filtered();$('countPill').textContent=`${DATA.length} 道大题`; $('importantPill').textContent=`⭐ ${DATA.filter(x=>x.important).length} 道重点`;renderCard(arr)}
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;render()});$('search').oninput=e=>{state.q=e.target.value;state.idx=0;render()};$('prev').onclick=()=>{state.idx--;renderCard(filtered())};$('next').onclick=()=>{state.idx++;renderCard(filtered())};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')$('prev').click(); if(e.key==='ArrowRight')$('next').click(); if(e.key==='1'){state.mode='blank';render()} if(e.key==='2'){state.mode='fast';render()} if(e.key==='3'){state.mode='full';render()}});
render();
</script>
